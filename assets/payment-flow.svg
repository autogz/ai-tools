<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#0044CC"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00CC88"/>
      <stop offset="100%" stop-color="#009966"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0066FF" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0066FF"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00CC88"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="798" height="298" fill="none" stroke="#1a1a2e" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold">Payment &amp; Activation Flow</text>
  <line x1="290" y1="35" x2="510" y2="35" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Step boxes and arrows -->

  <!-- Step 1: View Price -->
  <rect x="20" y="60" width="90" height="54" rx="8" fill="#1a1a2e" stroke="#0066FF" stroke-width="1.5"/>
  <text x="65" y="82" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">View Price</text>
  <text x="65" y="98" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">Step 1</text>
  <circle cx="65" cy="106" r="3" fill="#0066FF" opacity="0.5"/>

  <line x1="110" y1="87" x2="145" y2="87" stroke="#0066FF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Send USDT -->
  <rect x="145" y="60" width="90" height="54" rx="8" fill="#1a1a2e" stroke="#0066FF" stroke-width="1.5"/>
  <text x="190" y="82" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Send USDT</text>
  <text x="190" y="98" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">Step 2</text>
  <circle cx="190" cy="106" r="3" fill="#0066FF" opacity="0.5"/>

  <line x1="235" y1="87" x2="270" y2="87" stroke="#0066FF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 3: Copy TxHash -->
  <rect x="270" y="60" width="90" height="54" rx="8" fill="#1a1a2e" stroke="#0066FF" stroke-width="1.5"/>
  <text x="315" y="82" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Copy TxHash</text>
  <text x="315" y="98" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">Step 3</text>
  <circle cx="315" cy="106" r="3" fill="#0066FF" opacity="0.5"/>

  <line x1="360" y1="87" x2="395" y2="87" stroke="#0066FF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 4: aitools claim (wider) -->
  <rect x="395" y="55" width="140" height="64" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="465" y="77" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">aitools claim</text>
  <text x="465" y="95" text-anchor="middle" fill="#aaccff" font-family="monospace" font-size="9">&lt;tx_hash&gt;</text>
  <text x="465" y="110" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">Step 4</text>

  <line x1="535" y1="87" x2="570" y2="87" stroke="#0066FF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 5: Verify on Etherscan -->
  <rect x="570" y="60" width="100" height="54" rx="8" fill="#1a1a2e" stroke="#00CC88" stroke-width="1.5"/>
  <text x="620" y="82" text-anchor="middle" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Verify</text>
  <text x="620" y="98" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">Step 5</text>
  <circle cx="620" cy="106" r="3" fill="#00CC88" opacity="0.5"/>

  <line x1="670" y1="87" x2="705" y2="87" stroke="#00CC88" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Local Activation -->
  <rect x="705" y="60" width="90" height="54" rx="27" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="750" y="82" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Activated</text>
  <text x="750" y="98" text-anchor="middle" fill="#ccffee" font-family="system-ui, sans-serif" font-size="8">Step 6</text>
  <circle cx="708" cy="87" r="4" fill="#ffffff" filter="url(#glow)"/>

  <!-- Bottom progress bar -->
  <rect x="20" y="170" width="760" height="3" rx="2" fill="#1a1a2e"/>
  <rect x="20" y="170" width="760" height="3" rx="2" fill="#0066FF" opacity="0.3"/>

  <!-- Step labels below the bar -->
  <text x="65" y="195" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">1. Check pricing</text>
  <text x="190" y="195" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">2. Make payment</text>
  <text x="315" y="195" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">3. Copy hash</text>
  <text x="465" y="195" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">4. Run claim</text>
  <text x="620" y="195" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">5. Etherscan check</text>
  <text x="750" y="195" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">6. Ready to use</text>

  <!-- Bottom info panel -->
  <rect x="100" y="220" width="600" height="40" rx="6" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
  <text x="400" y="241" text-anchor="middle" fill="#666677" font-family="system-ui, sans-serif" font-size="9">
    Payment verification is fully on-chain. No personal data is stored.
  </text>
  <text x="400" y="253" text-anchor="middle" fill="#555566" font-family="system-ui, sans-serif" font-size="8">
    Supported chains: Ethereum, BNB Chain, Polygon, Arbitrum, Optimism
  </text>

  <!-- Decorative glow dots -->
  <circle cx="400" y="280" r="2" fill="#0066FF" opacity="0.2"/>
  <circle cx="750" y="280" r="2" fill="#00CC88" opacity="0.2"/>
</svg>
