# ── Unique Amount Calculation ──────────────────────────────────────────
# Each order gets a deterministic unique amount to prevent replay attacks.
# unique_amount = base_price_cents + deterministic_tail(order_id)
unique_amount:
  enabled: true
  method: deterministic_tail
  tail_modulus: 97  # Prime number for uniform distribution of tails 0-96
  min_tail_cents: 1
  max_tail_cents: 96
  description: >
    Each invoice amount is computed as base_price_cents + (hash(order_id) % tail_modulus).
    This ensures every order has a unique payment amount, preventing replay attacks
    where a paid invoice could be used as proof of payment for a different order.
    The tail is always at least 1 cent above the base price, never 0.
